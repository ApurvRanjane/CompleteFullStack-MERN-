<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <head>
        <h1>Feedback form</h1>
    </head>
        <div>
        <label for="name">Name:</label>
        <input type="text"name=name placeholder="Name" id="name">
        <br><br>
        <label for="mail">Email:</label>
        <input type="text"name=mail placeholder="Email" id="mail">
        <br><br>
    </div>
        <label for="feed">Message</label>
        <textarea name="feed" id="feed" placeholder="Message" rows="10" col="8"></textarea>
        <br><br>
        Rate us our of 5:<br>
        
       
        <label for="1">1</label>
        <input type="radio" name="rate" id="1" value="1>"<br><br>
   
        <label for ="2">2</label>
        <input type="radio" name="rate" id="2" value="2>"<br>
        <br>
        <label for="3">3</label>
        <input type="radio" name="rate" id="3" value="3>" <br>
        <br>
        <label for="4">4</label>
        <input type="radio" name="rate" id="4" value="4>" <br>
        <br>
        <label for="5">5</label>
        <input type="radio" name="rate" id="5" value="5>"  <br><br><br>
                              
        <button type="submit">Send Yor message</button>
    </form>
</body>
</html>
