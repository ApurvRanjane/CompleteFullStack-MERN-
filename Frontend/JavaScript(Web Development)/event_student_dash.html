<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard - Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url("https://img.freepik.com/free-vector/party-crowd-gold-bokeh-lights-stars_1048-12702.jpg?t=st=1752723125~exp=1752726725~hmac=32e2b6b6e7f9f4743b824e3a74b4ae0183b59e77fd5d8fa50523e2654b352df1&w=1380"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
    }

    .custom-navbar {
      background-color: #03415b;
      padding: 6px 10px;
      font-size: 0.9rem;
    }

    .custom-navbar .navbar-brand {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .small-nav .nav-link {
      color: #fff;
      margin: 0 5px;
      padding: 5px 12px;
    }

    .small-nav .nav-link:hover {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    .logout-link:hover {
      background-color: rgba(255, 0, 0, 0.2);
    }

    .event-card {
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
      background-color: rgba(255, 255, 255, 0.1);
      max-width: 280px;
      margin: auto;
      color: #fff;
    }

    .event-card:hover {
      transform: translateY(-8px);
    }

    .event-card img {
      height: 120px;
      width: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
    }

    .event-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .event-detail {
      font-size: 0.9rem;
      margin-bottom: 5px;
      color: #eaeaea;
    }

    .dashboard-header {
      margin-top: 30px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand text-white" href="#">LMS Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto small-nav">
          <li class="nav-item"><a class="nav-link text-white" href="#">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Settings</a></li>
          <li class="nav-item"><a class="nav-link text-white logout-link" href="#">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="container mt-5">
    <h2 class="dashboard-header text-white">Upcoming College Events</h2>
    <div class="row" id="eventContainer">
      <!-- Event cards will be dynamically injected here -->
    </div>
  </div>

  <!-- JavaScript to insert events -->
  <script>
    const events = [
      {
        title: "Tech Fest 2025",
        description: "Join us for the biggest tech event of the year with robotics, AI, gaming and more.",
        date: "2025-08-20",
        time: "10:00 AM",
        location: "Main Auditorium",
        image_url: "https://img.freepik.com/free-vector/technology-conference-poster_52683-43310.jpg"
      },
      {
        title: "Cultural Night",
        description: "An evening of dance, music, food and fashion to celebrate diversity on campus.",
        date: "2025-08-25",
        time: "6:30 PM",
        location: "Open Air Theatre",
        image_url: "https://img.freepik.com/free-vector/hand-drawn-flat-design-culture-day-illustration_23-2149326337.jpg"
      },
      {
        title: "Startup Pitch Event",
        description: "Watch students pitch their ideas to real investors and win seed funding!",
        date: "2025-09-02",
        time: "2:00 PM",
        location: "Seminar Hall B",
        image_url: "https://img.freepik.com/free-vector/startup-life-concept-illustration_114360-1229.jpg"
      }
    ];

    const container = document.getElementById('eventContainer');

    events.forEach(event => {
      const card = document.createElement('div');
      card.classList.add('col-md-6', 'col-lg-4', 'mb-4');
      card.innerHTML = `
        <div class="event-card card h-100">
          <img src="${event.image_url}" alt="Event Image">
          <div class="card-body">
            <h5 class="event-title">${event.title}</h5>
            <p class="event-detail"><strong>Date:</strong> ${event.date}</p>
            <p class="event-detail"><strong>Time:</strong> ${event.time}</p>
            <p class="event-detail"><strong>Location:</strong> ${event.location}</p>
            <p class="event-detail">${event.description}</p>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  </script>

</body>
</html>
