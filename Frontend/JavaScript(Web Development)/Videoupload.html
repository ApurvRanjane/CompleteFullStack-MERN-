<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Video | LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div class="max-w-3xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg">
    <h1 class="text-2xl font-semibold mb-6 text-center text-blue-700">🎥 Upload Lecture Video</h1>

    <form id="uploadForm" class="space-y-5">
      <!-- Title -->
      <div>
        <label class="block mb-1 font-medium">Video Title</label>
        <input type="text" id="title" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <!-- Subject -->
      <div>
        <label class="block mb-1 font-medium">Subject</label>
        <input type="text" id="subject" required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <!-- Description -->
      <div>
        <label class="block mb-1 font-medium">Description</label>
        <textarea id="description" rows="3" required
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <!-- Video Upload Area -->
      <div>
        <label class="block mb-2 font-medium">Upload Video</label>
        <div class="flex items-center justify-center w-full">
          <label for="videoFile"
                 class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-10 h-10 mb-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 16v-4a4 4 0 014-4h0a4 4 0 014 4v4m-4-4v8"></path>
              </svg>
              <p class="mb-1 text-sm text-gray-600"><span class="font-semibold">Click to upload</span> or drag & drop</p>
              <p class="text-xs text-gray-500">MP4, MKV, or AVI (max 100MB)</p>
            </div>
            <input id="videoFile" type="file" class="hidden" accept="video/*" required />
          </label>
        </div>
      </div>

      <!-- Video Preview -->
      <div id="previewContainer" class="hidden">
        <label class="block mb-2 font-medium mt-4">Preview:</label>
        <video id="videoPreview" controls class="w-full rounded-lg shadow-md"></video>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Upload Video
      </button>
    </form>
  </div>

  <script>
    const videoInput = document.getElementById('videoFile');
    const videoPreview = document.getElementById('videoPreview');
    const previewContainer = document.getElementById('previewContainer');
    const uploadForm = document.getElementById('uploadForm');

    videoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        videoPreview.src = url;
        previewContainer.classList.remove('hidden');
      }
    });

    uploadForm.addEventListener('submit', function (e) {
      e.preventDefault();
      // Simulate success
      alert("✅ Video uploaded successfully (for now, this is a mock)");
      uploadForm.reset();
      previewContainer.classList.add('hidden');
      videoPreview.src = '';
    });
  </script>

</body>
</html>
