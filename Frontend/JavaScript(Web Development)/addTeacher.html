<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url("https://smartcampuses.com/wp-content/uploads/revslider/web-agency-home-content/Slide-2-Background.jpg");
      background-size: cover;
      background-attachment: fixed;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background-color: rgba(255, 255, 255, 0.97);
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.15);
    }

    .form-title {
      font-weight: 600;
      font-size: 28px;
      color: #333;
    }

    .table-container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    label {
      font-weight: 500;
    }

    .btn-primary {
      font-size: 16px;
      padding: 10px 0;
    }
  </style>
</head>
<body>
{% block start %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <a class="navbar-brand ms-3" href="#">LMS Portal</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link active" href="/admin_dash/">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="#">User Management</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
      <li class="nav-item"><a class="nav-link" href="/userlogout/">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <h2 class="text-center mb-4 form-title">Teacher Registration Form</h2>
  <form id="teacherForm" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" required />
      </div>
      <div class="col-md-6 mb-3">
        <label for="mobile" class="form-label">Phone Number</label>
        <input type="number" class="form-control" name="mobile" required />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" required />
      </div>
      <div class="col-md-6 mb-3">
        <label for="qualification" class="form-label">Qualification</label>
        <input type="text" class="form-control" name="qualification" required />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="experience" class="form-label">Years of Experience</label>
        <input type="number" class="form-control" name="experience" required />
      </div>
      <div class="col-md-6 mb-3">
        <label for="image" class="form-label">Image</label>
        <input type="file" class="form-control" name="image" accept="image/jpeg" required />
      </div>
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <textarea class="form-control" name="address" rows="3" required></textarea>
    </div>

    <div class="mb-3">
      <label for="post" class="form-label">Post</label>
      <select class="form-select" name="post">
        <option value="">Select Post</option>
        <option>Head Professor</option>
        <option>Assistant Professor</option>
        <option>Class Co-Ordinator</option>
      </select>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="branch" class="form-label">Branch</label>
        <select class="form-select" name="branch" id="branch">
          <option value="">Select Branch</option>
          <option value="CSE">CSE</option>
          <option value="IT">IT</option>
          <option value="ECE">ECE</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label for="year" class="form-label">Year</label>
        <select class="form-select" name="year" id="year">
          <option value="">Select Year</option>
          <option value="First">First</option>
          <option value="Second">Second</option>
          <option value="Third">Third</option>
          <option value="Final">Final</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label for="semester" class="form-label">Semester</label>
        <select class="form-select" name="semester" id="semester">
          <option value="">Select Semester</option>
        </select>
      </div>
    </div>

    <div class="row">

      <div class="col-md-6 mb-3">
        <label for="division" class="form-label">Division <small class="text-muted">(Type in capital)</small></label>
        <input type="text" class="form-control" name="division" placeholder="e.g A,B.." style="text-transform: uppercase;">
      </div>

      <div class="col-md-6 mb-3">
        <label for="subject" class="form-label">Subject</label>
        <select class="form-select" name="subject" id="subject">
          <option value="">Select Subject</option>
        </select>
      </div>
      
      
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary w-100">Register</button>
    </div>
    
    {% if message %}
    <p class="text-success text-center mt-3">{{ message }}</p>
    {% endif %}
  </form>
</div>

<div class="table-container">
  <h4 class="text-center mb-3">Registered Details Summary</h4>
  <table class="table table-bordered">
    <thead class="table-light">
      <tr>
        <th>Post</th>
        <th>Branch</th>
        <th>Year</th>
        <th>Semester</th>
        <th>Subject</th>
        <th>Division</th>
      </tr>
    </thead>
    <tbody id="summaryTableBody">
    </tbody>
  </table>
</div>
{% endblock %}

<script>
const semesterMap = {
  First: ['1', '2'],
  Second: ['3', '4'],
  Third: ['5', '6'],
  Final: ['7', '8']
};

const subjectMap = {
  'CSE': {
    'First': { '1': ['Maths I', 'Physics'], '2': ['Maths II', 'C'] },
    'Second': { '3': ['DSA'], '4': ['OOP', 'DBMS'] }
  },
  'IT': {
    'First': { '1': ['Maths I', 'Basics of IT'], '2': ['C Programming'] },
    'Second': { '3': ['OS'], '4': ['Networks'] }
  },
  'ECE': {
    'First': { '1': ['Maths I'], '2': ['Digital Logic'] },
    'Second': { '3': ['Microprocessor'], '4': ['VLSI'] }
  }
};

document.getElementById("year").addEventListener("change", function () {
  const year = this.value;
  const semSelect = document.getElementById("semester");
  semSelect.innerHTML = `<option value="">Select Semester</option>`;
  semesterMap[year]?.forEach(s => {
    semSelect.innerHTML += `<option value="${s}">${s}</option>`;
  });
});

document.getElementById("semester").addEventListener("change", updateSubjects);
document.getElementById("branch").addEventListener("change", updateSubjects);
document.getElementById("year").addEventListener("change", updateSubjects);

function updateSubjects() {
  const branch = document.getElementById("branch").value;
  const year = document.getElementById("year").value;
  const semester = document.getElementById("semester").value;
  const subjectSelect = document.getElementById("subject");

  subjectSelect.innerHTML = `<option value="">Select Subject</option>`;

  if (subjectMap[branch]?.[year]?.[semester]) {
    subjectMap[branch][year][semester].forEach(sub => {
      subjectSelect.innerHTML += `<option>${sub}</option>`;
    });
  }
}

// Add to table when all 4 academic fields are selected
["branch", "year", "semester", "subject"].forEach(id => {
  document.getElementById(id).addEventListener("change", tryAddRow);
});

function tryAddRow() {
  const post = document.querySelector('[name="post"]').value;
  const branch = document.querySelector('[name="branch"]').value;
  const year = document.querySelector('[name="year"]').value;
  const semester = document.querySelector('[name="semester"]').value;
  const subject = document.querySelector('[name="subject"]').value;
  const division = document.querySelector('[name="division"]').value;

  if (branch && year && semester && subject) {
    const tableBody = document.getElementById("summaryTableBody");

    // Check if this combo already exists
    const rows = Array.from(tableBody.rows);
    const isDuplicate = rows.some(row =>
      row.cells[1].textContent === branch &&
      row.cells[2].textContent === year &&
      row.cells[3].textContent === semester &&
      row.cells[4].textContent === subject
    );
    if (isDuplicate) return;

    const row = `
      <tr>
        <td>${post || "-"}</td>
        <td>${branch}</td>
        <td>${year}</td>
        <td>${semester}</td>
        <td>${subject}</td>
        <td>${division || "-"}</td>
      </tr>`;
    tableBody.insertAdjacentHTML("beforeend", row);
  }
}

document.getElementById("teacherForm").addEventListener("submit", function (e) {
  e.preventDefault();
  alert("Teacher Registered Successfully!");
  this.reset();
  document.getElementById("summaryTableBody").innerHTML = ""; // optional: clear table after submit
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
