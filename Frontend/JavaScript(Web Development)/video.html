<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LMS Video Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f5f7fa;
    }

    .sidebar {
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 1rem;
      border: 1px solid #ddd;
      background-color: #ffffff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .video-player {
      width: 800px;
      height: 550px;
      margin: 0 auto;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    .video-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 1rem;
      text-align: center;
    }

    .video-description {
      font-size: 1rem;
      margin-top: 0.5rem;
      text-align: center;
    }

    .app-card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 1rem;
    }

    .sidebar h5 {
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .list-group-item.active {
      background-color: #0d6efd;
      border-color: #0d6efd;
    }

    .custom-container {
      padding: 20px;
    }

    @media (min-width: 768px) {
      .col-md-2.sidebar {
        flex: 0 0 20%;
        max-width: 20%;
      }

      .col-md-3.sidebar {
        flex: 0 0 25%;
        max-width: 25%;
      }

      .col-md-7 {
        flex: 0 0 55%;
        max-width: 55%;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">College LMS</a>
  </div>
</nav>

<!-- Page Content -->
<div class="container-fluid custom-container">
  <div class="row">

    <!-- Left Sidebar: Video List -->
    <div class="col-md-2 sidebar">
      <h5>Video Topics</h5>
      <div class="list-group" id="videoList">
        <button class="list-group-item list-group-item-action active" onclick="loadVideo(0)">Introduction to AI</button>
        <button class="list-group-item list-group-item-action" onclick="loadVideo(1)">Machine Learning</button>
        <button class="list-group-item list-group-item-action" onclick="loadVideo(2)">Neural Networks</button>
      </div>
    </div>

    <!-- Center: Video Player -->
    <div class="col-md-7 p-3 d-flex flex-column align-items-center">
      <div class="video-player mb-3">
        <video id="mainVideo" width="100%" height="100%" controls>
          <source id="videoSource" src="" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
      <div class="video-title" id="videoTitle">Introduction to AI</div>
      <div class="video-description" id="videoDescription">
        This video introduces the concept of Artificial Intelligence, covering basic definitions and examples.
      </div>
    </div>

    <!-- Right Sidebar: AI Applications -->
    <div class="col-md-3 sidebar">
      <h5>AI Applications</h5>
      <div id="applicationList">
        <!-- Filled dynamically -->
      </div>
    </div>

  </div>
</div>

<!-- JavaScript -->
<script>
  const videos = [
    {
      title: "Introduction to AI",
      description: "This video introduces the concept of Artificial Intelligence, covering basic definitions and examples.",
      src: "https://www.w3schools.com/html/mov_bbb.mp4",
      apps: [
        "Healthcare: AI used in diagnostics and surgery assistance.",
        "Education: Personalized learning through AI tutors."
      ]
    },
    {
      title: "Machine Learning",
      description: "Explore the fundamentals of Machine Learning, including supervised and unsupervised learning.",
      src: "https://www.w3schools.com/html/movie.mp4",
      apps: [
        "Finance: Fraud detection in banking.",
        "Marketing: Customer segmentation and recommendation engines."
      ]
    },
    {
      title: "Neural Networks",
      description: "Dive into neural networks, perceptrons, and backpropagation.",
      src: "https://www.w3schools.com/html/mov_bbb.mp4",
      apps: [
        "Self-driving cars: Object detection and decision making.",
        "Voice Assistants: Natural language understanding."
      ]
    }
  ];

  function loadVideo(index) {
    const video = videos[index];
    document.getElementById('videoSource').src = video.src;
    const videoElement = document.getElementById('mainVideo');
    videoElement.load();

    document.getElementById('videoTitle').innerText = video.title;
    document.getElementById('videoDescription').innerText = video.description;

    const appList = document.getElementById('applicationList');
    appList.innerHTML = '';
    video.apps.forEach(app => {
      const card = document.createElement('div');
      card.className = 'app-card';
      card.innerText = app;
      appList.appendChild(card);
    });

    const listItems = document.querySelectorAll('#videoList button');
    listItems.forEach(btn => btn.classList.remove('active'));
    listItems[index].classList.add('active');
  }

  // Load the first video by default
  window.onload = () => {
    loadVideo(0);
  };
</script>

</body>
</html>
