<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TazZA Organic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #0a2c23 !important;
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-link {
      color: white !important;
      margin-right: 20px;
    }

    .nav-link.active {
      color: #7CFC00 !important;
    }

    .hero {
      padding: 60px 15px;
      background-color: #ffffff;
    }

    .hero h1 {
      font-weight: bold;
      color: #0a2c23;
    }

    .hero h4 {
      background-color: #0a2c23;
      color: white;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 4px;
      margin-top: 15px;
    }

    .hero p {
      color: #666;
      margin-top: 15px;
    }

    .btn-success {
      background-color: #38b000;
      border: none;
      padding: 10px 20px;
      margin-top: 20px;
    }

    .btn-success:hover {
      background-color: #2d8700;
    }

    .call-info {
      color: white;
      font-size: 0.85rem;
      text-align: right;
    }

    .call-info span {
      color: #7CFC00;
      font-weight: bold;
    }

    .veg-image {
      max-width: 100%;
      max-height: 400px;
    }

    @media(max-width: 768px) {
      .call-info {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand text-success" href="#">🌿 TazZA</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav text-center">
        <li class="nav-item"><a class="nav-link active" href="#">HOME</a></li>
        <li class="nav-item"><a class="nav-link" href="#">ABOUT</a></li>
        <li class="nav-item"><a class="nav-link" href="#">PRODUCT</a></li>
        <li class="nav-item"><a class="nav-link" href="#">GALLERY</a></li>
        <li class="nav-item"><a class="nav-link" href="#">CONTACT</a></li>
      </ul>
    </div>
    <div class="d-none d-lg-block call-info">
      Call Us: <br><span>+91 1234567890</span>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <div class="row align-items-center">
        <!-- Left Text -->
        <div class="col-lg-6 text-center text-lg-start mb-4 mb-lg-0">
          <h1 class="display-5">100% Organic</h1>
          <h4>Fresh & Natural Farm Food</h4>
          <p>The readable content of a page when looking at its layout point of using of letters, as opposed.</p>
          <a href="#" class="btn btn-success">ALL PRODUCTS</a>
        </div>

        <!-- Right Image -->
        <div class="col-lg-6 text-center">
          <img src="https://i.imgur.com/U5rOXFo.png" alt="Organic Veggies" class="veg-image">
        </div>
      </div>
    </div>
  </section>

  <!-- Bootstrap Script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
