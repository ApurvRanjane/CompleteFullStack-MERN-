<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Subject Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("https://smartcampuses.com/wp-content/uploads/revslider/web-agency-home-content/Slide-2-Background.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 30px;
        }

        .container.form-container {
            background: #fff;
            max-width: 800px;
            margin: 100px auto 30px;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        select, input[type="text"], input[type="date"], input[type="submit"], input[type="reset"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        input[type="submit"], input[type="reset"] {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover, input[type="reset"]:hover {
            background-color: #0056b3;
        }

        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }
        .nav-link {
    font-weight: bold !important;
}

    </style>

    <script>
        const subjectMaster = {
            "1st": {
                "1": [
                    { name: "Physics", code: "PHY101" },
                    { name: "Maths-I", code: "MTH101" },
                    { name: "PPS", code: "CSE101" }
                ],
                "2": [
                    { name: "Chemistry", code: "CHM102" },
                    { name: "Maths-II", code: "MTH102" },
                    { name: "BEE", code: "EEE102" }
                ]
            },
            "2nd": {
                "1": [
                    { name: "DS", code: "CSE201" },
                    { name: "DELD", code: "ECE201" },
                    { name: "OOP", code: "CSE202" }
                ],
                "2": [
                    { name: "SE", code: "CSE203" },
                    { name: "Microprocessor", code: "ECE202" },
                    { name: "PPL", code: "CSE204" }
                ]
            },
            "3rd": {
                "1": [
                    { name: "AI", code: "CSE301" },
                    { name: "ML", code: "CSE302" }
                ],
                "2": [
                    { name: "Big Data", code: "CSE303" },
                    { name: "Cybersecurity", code: "CSE304" }
                ]
            },
            "4th": {
                "1": [
                    { name: "Project", code: "CSE401" },
                    { name: "Seminar", code: "CSE402" }
                ],
                "2": [
                    { name: "Internship", code: "CSE403" },
                    { name: "Thesis", code: "CSE404" }
                ]
            }
        };

        function updateSemesters() {
            const year = document.getElementById("year").value;
            const semesterSelect = document.getElementById("semester");
            const subjectSelect = document.getElementById("subject");
            const codeInput = document.getElementById("subject_code");

            semesterSelect.innerHTML = "<option value=''>--Select Semester--</option>";
            subjectSelect.innerHTML = "<option value=''>--Select Subject--</option>";
            codeInput.value = "";

            if (year) {
                semesterSelect.innerHTML += `<option value="1">Semester 1</option>
                                             <option value="2">Semester 2</option>`;
            }
        }

        function updateSubjects() {
            const year = document.getElementById("year").value;
            const semester = document.getElementById("semester").value;
            const subjectSelect = document.getElementById("subject");
            const codeInput = document.getElementById("subject_code");

            subjectSelect.innerHTML = "<option value=''>--Select Subject--</option>";
            codeInput.value = "";

            if (subjectMaster[year] && subjectMaster[year][semester]) {
                subjectMaster[year][semester].forEach(sub => {
                    const option = document.createElement("option");
                    option.value = sub.code;
                    option.text = sub.name;
                    option.setAttribute("data-code", sub.code);
                    subjectSelect.add(option);
                });
            }
        }

        function setSubjectCode() {
            const subjectDropdown = document.getElementById("subject");
            const selectedOption = subjectDropdown.options[subjectDropdown.selectedIndex];
            const code = selectedOption.getAttribute("data-code");
            document.getElementById("subject_code").value = code || "";
        }
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="https://img.studyclap.com/img/institute/logo/c26fb2db83-jscoe-pune.jpg" alt="Logo">
                <span class="d-none d-lg-inline">JSPM's Jaywantrao Sawant Insti Of Engi, Pune</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class="container form-container">
        <h2>Admin - Upload Subject Details</h2>
        <form method="post">
            <label for="year">Select Year:</label>
            <select id="year" onchange="updateSemesters()">
                <option value="">--Select Year--</option>
                <option value="1st">First Year</option>
                <option value="2nd">Second Year</option>
                <option value="3rd">Third Year</option>
                <option value="4th">Fourth Year</option>
            </select>

            <label for="semester">Select Semester:</label>
            <select id="semester" onchange="updateSubjects()">
                <option value="">--Select Semester--</option>
            </select>

            <label for="subject">Select Subject:</label>
            <select id="subject" onchange="setSubjectCode()">
                <option value="">--Select Subject--</option>
            </select>

            <label for="subject_code">Subject Code:</label>
            <input type="text" id="subject_code" readonly placeholder="Will auto-fill based on subject">

            <label for="upload_date">Date:</label>
            <input type="date" id="upload_date">

            <input type="submit" id="submitBtn" value="Submit">
            <input type="reset" id="resetBtn" value="Reset">
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
