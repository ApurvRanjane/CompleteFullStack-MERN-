<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Notice</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url("https://smartcampuses.com/wp-content/uploads/revslider/web-agency-home-content/Slide-2-Background.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
    }

    .notice-card {
      background-color: #ffffff;
      border: none;
      border-radius: 25px;
      padding: 50px;
      width: 100%;
      max-width: 750px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      transition: 0.3s;
    }

    .notice-card:hover {
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.16);
    }

    .form-label {
      font-weight: 600;
      color: #333;
    }

    .form-control, .form-select {
      border-radius: 12px;
      font-size: 16px;
    }

    .btn-primary {
      background-color: #4f46e5;
      border-color: #4f46e5;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #4338ca;
    }

    h3 {
      font-weight: 600;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 35px;
      font-size: 28px;
    }

    input[type="file"]::file-selector-button {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      background-color: #4f46e5;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    input[type="file"]::file-selector-button:hover {
      background-color: #63a4ff; /* Light blue on hover */
    }
  </style>
</head>
<body>

  <div class="notice-card">
    <h3>Add New Notice</h3>
    <form>
      <!-- Date -->
      <div class="mb-3">
        <label for="noticeDate" class="form-label">Date</label>
        <input type="date" class="form-control" id="noticeDate" required />
      </div>

      <!-- Topic -->
      <div class="mb-3">
        <label for="noticeTopic" class="form-label">Topic</label>
        <input
          type="text"
          class="form-control"
          id="noticeTopic"
          placeholder="Enter notice topic"
          required
        />
      </div>

      <!-- Who Can See -->
      <div class="mb-3">
        <label for="noticeAudience" class="form-label">Who Can See</label>
        <select class="form-select" id="noticeAudience" required>
          <option value="">-- Select Audience --</option>
          <option value="all">Everyone</option>
          <option value="students">Students</option>
          <option value="teachers">Teachers</option>
          <option value="admins">Admins</option>
        </select>
      </div>

      <!-- PDF Upload -->
      <div class="mb-4">
        <label for="noticeFile" class="form-label">Attach PDF</label>
        <input
          class="form-control"
          type="file"
          id="noticeFile"
          accept=".pdf"
          required
        />
      </div>

      <!-- Submit Button -->
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Submit Notice</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
