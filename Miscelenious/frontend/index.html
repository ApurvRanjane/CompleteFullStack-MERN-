<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get&Post request</title>
</head>
<body>
    <h3>Get request</h3>
    <form method="get" action="http://localhost:8080/register">
        <input placeholder="enter username" name="username">
         <input placeholder="enter password" name="password">
         <button>Submit</button>
    </form>

     <h3>Post request</h3>
    <form method="post" action="http://localhost:8080/register">
        <input placeholder="enter username" name="username">
         <input placeholder="enter password" name="password">
         <button>Submit</button>
    </form>
</body>
</html>
