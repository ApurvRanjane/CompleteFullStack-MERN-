<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Page</title>

  <style>
    body {
      border: none;
      border-radius: 2px;
      padding: 0.25rem 1rem;
      margin-top: 1rem;
      cursor: pointer;
      font-size: 1rem;
      font-family: Arial, sans-serif;
    }

    form {
      border: 2px solid grey;
      display: inline-block;
      padding: 2rem;
    }

    .field {
      margin-bottom: 0.5rem;
    }

    label {
      display: inline-block;
      width: 90px;
    }

    input {
      padding: 5px;
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <h1>Hi User, Welcome to our App!</h1>
  <p>
    You can sign up to the platform to access all important notifications.
  </p>

  <form action="/addUser" method="POST" target="_blank" id="signupForm">
    <div class="field">
      <label for="email">Email:</label>
      <input
        type="text"
        placeholder="johndoe@email.com"
        name="email"
        required
      />
    </div>

    <div class="field">
      <label for="username">Username:</label>
      <input
        type="text"
        placeholder="John Doe"
        name="username"
        required
      />
    </div>

    <div class="field">
      <label for="password">Password:</label>
      <input
        type="password"
        placeholder="password"
        name="password"
        required
      />
    </div>

    <button id="formBtn" onclick="resetForm()">Sign up</button>
  </form>

  <script>
    function resetForm() {
      let myForm = document.getElementById("signupForm");
      myForm.reset();
      return false;
    }
  </script>
</body>
</html>
